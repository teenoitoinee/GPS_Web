<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกพิกัด GPS พนักงาน</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="container">
        <h2>📍 ระบบบันทึกพิกัด GPS พนักงาน</h2>
        
        <form id="gpsForm">
            <div class="form-group">
                <label>รหัสพนักงาน:</label>
                <input type="text" id="empId" required placeholder="ตัวอย่าง: EMP001">
            </div>
            <div class="form-group">
                <label>ตำแหน่งงาน:</label>
                <input type="text" id="position" required placeholder="ตัวอย่าง: ไอที, ฝ่ายขาย">
            </div>
            <div class="form-group">
                <label>วันที่:</label>
                <input type="date" id="date" required>
            </div>
            
            <hr>
            
            <div class="btn-group">
                <button type="button" id="getGpsBtn" class="btn-gps">📡 ดึงพิกัดจากระบบ GPS</button>
            </div>

            <div class="form-group">
                <label>Latitude:</label>
                <input type="number" id="latitude" step="any" required placeholder="กรอกเองหรือกดปุ่มด้านบน/จิ้มแผนที่">
            </div>
            <div class="form-group">
                <label>Longitude:</label>
                <input type="number" id="longitude" step="any" required placeholder="กรอกเองหรือกดปุ่มด้านบน/จิ้มแผนที่">
            </div>

            <button type="submit" class="btn-submit">💾 บันทึกข้อมูล</button>
        </form>

        <button id="exportBtn" class="btn-export">📥 Export เป็นไฟล์ CSV</button>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
